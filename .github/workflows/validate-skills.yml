name: validate-skills

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-skills-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.13']

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-ci.txt

      - name: Run repository and skill tests
        run: ./scripts/ci.sh

      - name: Enforce branch coverage
        if: matrix.python-version == '3.13'
        run: ./scripts/coverage.sh

      - name: Upload coverage report
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: error
          retention-days: 14

  skills-cli:
    name: skills CLI discovery
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          package-manager-cache: false

      - name: Discover every installable skill
        run: |
          output="$(npx --yes skills@latest add . --list)"
          printf '%s\n' "$output"
          clean="$(printf '%s' "$output" | sed -E $'s/\\x1B\\[[0-9;?]*[ -/]*[@-~]//g')"
          grep -F 'Found 18 skills' <<<"$clean"
